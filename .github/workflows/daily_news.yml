name: Daily Design News Report

on:
  schedule:
    # UTC 22:20 = 台灣時間 06:20 (UTC+8)
    - cron: '20 22 * * *'
  workflow_dispatch: # 手動觸發

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check feed health
        run: python check_feeds.py

      - name: Generate daily report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ seen_urls.json
          git diff --cached --quiet || git commit -m "✏️ Auto-generate daily design report $(date +'%Y-%m-%d')"
          git pull --rebase origin master
          git push

      - name: Send Telegram notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPORT=$(ls -t public/reports/*_Daily_Report.md 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            TITLE=$(grep -m1 '^# ' "$REPORT" | sed 's/^# //')
            DATE=$(basename "$REPORT" | cut -d'_' -f1)
            MSG="✏️ *設計脈動日報已更新*%0A📅 ${DATE}%0A📋 ${TITLE}%0A🔗 [閱讀全文](https://tingyusdeco.com/daily-reports/)"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview="true"
          fi
