<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    <meta property="og:title" content="{{PAGE_TITLE}}">
    <meta property="og:description" content="{{META_DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{CANONICAL_URL}}">
    <meta property="og:image" content="{{OG_IMAGE}}">
    <link rel="canonical" href="{{CANONICAL_URL}}">
    <meta name="theme-color" content="{{THEME_COLOR}}">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="alternate" type="application/rss+xml" title="{{SITE_NAME}} RSS" href="/feed.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8F7EE;
            --cream: #F8F7EE;
            --mint: #E3F3F1;
            --accent: {{ACCENT_COLOR}};
            --accent-dark: {{ACCENT_DARK}};
            --gold: #C9A96E;
            --gold-light: #E8D5A8;
            --text: #1A202C;
            --text-muted: #4A5568;
            --text-secondary: #718096;
            --panel-bg: rgba(255,255,255,0.45);
            --panel-border: rgba(255,255,255,0.7);
            --radius: 12px;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.04);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, var(--mint) 0, transparent 55%),
                radial-gradient(at 100% 100%, color-mix(in srgb, var(--accent) 15%, transparent) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* === Layout === */
        .page-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }

        /* === Sidebar === */
        .sidebar {
            width: 300px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 10px 40px -10px color-mix(in srgb, var(--accent) 25%, transparent);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
        }

        .sidebar-brand {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-brand h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand .brand-icon {
            font-size: 1.2rem;
        }

        .sidebar-brand a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .sidebar-brand a:hover { color: var(--accent); }

        .mobile-close {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .sidebar-search {
            padding: 12px 16px;
        }
        .sidebar-search input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            background: rgba(255,255,255,0.3);
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            color: var(--text);
        }
        .sidebar-search input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.5);
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            list-style: none;
        }

        .nav-section { margin-bottom: 6px; }
        .nav-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 10px;
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }
        .nav-section-header:hover { background: rgba(255,255,255,0.35); }
        .nav-section-header .icon { color: var(--accent); font-size: 0.85rem; }
        .nav-count {
            margin-left: auto;
            background: rgba(255,255,255,0.4);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .nav-arrow {
            font-size: 0.6rem;
            transition: transform 0.3s;
            color: var(--text-secondary);
        }
        .nav-section.open .nav-arrow { transform: rotate(180deg); }

        .nav-items {
            list-style: none;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.3s;
            padding-left: 4px;
        }
        .nav-section.open .nav-items {
            max-height: 2000px;
            opacity: 1;
        }

        .nav-link {
            display: block;
            padding: 10px 14px;
            margin: 4px 0;
            background: rgba(255,255,255,0.2);
            border: 1px solid transparent;
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.6);
            color: var(--text);
            transform: translateX(4px);
        }
        .nav-link.active {
            background: rgba(255,255,255,0.9);
            border-color: rgba(255,255,255,1);
            color: var(--text);
            box-shadow: 0 4px 15px color-mix(in srgb, var(--accent) 20%, transparent);
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.5);
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .sidebar-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* === Main Content === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            padding: 16px 35px;
        }
        .menu-toggle {
            display: none;
            background: rgba(255,255,255,0.5);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            color: var(--text);
            margin-right: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: var(--shadow-soft);
        }
        .topbar-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text);
        }
        .topbar-home {
            margin-left: auto;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.5rem;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.3);
            border: 1px solid var(--panel-border);
            transition: all 0.3s;
        }
        .topbar-home:hover { color: var(--accent); background: rgba(255,255,255,0.6); }

        .article-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 20px;
        }

        /* === Article === */
        .article-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), var(--shadow-soft);
            padding: 48px 56px;
            line-height: 1.8;
            font-size: 1.05rem;
            color: #3b4252;
        }

        /* Article typography — matching website classical style */
        .article-card h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            border-bottom: 2px solid var(--gold-light);
            padding-bottom: 12px;
            margin-bottom: 1.2em;
            line-height: 1.3;
        }

        .article-card h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.45rem;
            font-weight: 600;
            color: var(--accent-dark);
            margin-top: 2em;
            margin-bottom: 0.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .article-card h2::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 22px;
            background: var(--accent);
            border-radius: 3px;
            flex-shrink: 0;
        }

        .article-card h3 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            margin-top: 1.8em;
            margin-bottom: 0.6em;
        }

        .article-card h4 {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--accent-dark);
            margin-top: 1.4em;
            margin-bottom: 0.5em;
        }

        .article-card p {
            margin-bottom: 1.2em;
        }

        .article-card a {
            color: var(--accent-dark);
            text-decoration: underline;
            text-decoration-color: var(--gold-light);
            text-underline-offset: 3px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .article-card a:hover {
            color: var(--accent);
        }

        .article-card strong {
            font-weight: 700;
            color: var(--text);
        }

        .article-card ul, .article-card ol {
            margin-bottom: 1.5em;
            padding: 18px 18px 18px 36px;
            background: rgba(255,255,255,0.4);
            border-radius: var(--radius);
        }

        .article-card li {
            margin-bottom: 1.4em;
            line-height: 1.9;
        }
        .article-card li:last-child {
            margin-bottom: 0;
        }
        .article-card li::marker {
            color: var(--gold);
        }

        .article-card blockquote {
            border-left: 3px solid var(--gold);
            background: var(--mint);
            padding: 14px 20px;
            margin: 1.5em 0;
            border-radius: 0 var(--radius) var(--radius) 0;
            font-style: italic;
            color: var(--text-muted);
        }

        .article-card hr {
            border: none;
            height: 1px;
            margin: 2.5em 0;
            position: relative;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            overflow: visible;
        }
        .article-card hr::after {
            content: '◆ ✦ ◆';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg);
            padding: 0 1.5rem;
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 0.4em;
        }

        .article-card table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
        }
        .article-card th {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 600;
            color: var(--gold);
            border-bottom: 2px solid var(--gold-light);
            padding: 8px 12px;
            text-align: left;
        }
        .article-card td {
            padding: 6px 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Prev/Next navigation */
        .article-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 3em;
            padding-top: 1.5em;
            border-top: 1px solid var(--gold-light);
            gap: 1em;
        }
        .article-nav a {
            padding: 10px 20px;
            background: rgba(255,255,255,0.5);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .article-nav a:hover {
            background: rgba(255,255,255,0.8);
            color: var(--accent-dark);
        }
        .article-nav .spacer { flex: 1; }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: color-mix(in srgb, var(--accent) 30%, transparent);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: color-mix(in srgb, var(--accent) 60%, transparent);
        }

        /* === Mobile === */
        @media (max-width: 768px) {
            .page-wrapper { padding: 0; gap: 0; }
            .sidebar {
                position: fixed;
                left: 0; top: 0;
                transform: translateX(-100%);
                width: 85%;
                max-width: 320px;
                border-radius: 0;
                background: rgba(248,247,238,0.97);
            }
            .sidebar.open {
                transform: translateX(0);
                box-shadow: 20px 0 50px rgba(0,0,0,0.15);
            }
            .mobile-close { display: block; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
            .article-card {
                border-radius: 0;
                border: none;
                padding: 24px 20px;
                box-shadow: none;
                background: transparent;
            }
            .article-card h1 { font-size: 1.5rem; }
            .topbar { padding: 12px 16px; background: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(0,0,0,0.05); }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h2><span class="brand-icon">{{BRAND_ICON}}</span> {{SITE_NAME}}</h2>
                <button class="mobile-close" id="closeSidebar" aria-label="關閉選單">✕</button>
            </div>
            <div class="sidebar-search">
                <input type="text" id="searchInput" placeholder="🔍 搜尋報告...">
            </div>
            <nav>
                <ul class="sidebar-nav" id="navList"></ul>
            </nav>
            <div class="sidebar-footer">
                MADE BY <a href="https://tingyudeco.com" target="_blank">tingyudeco.com</a>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="topbar">
                <button class="menu-toggle" id="openSidebar" aria-label="開啟選單">☰</button>
                <span class="topbar-title">{{TOPBAR_TITLE}}</span>
                <a href="https://tingyudeco.com/insights" class="topbar-home" title="All Insights">⌂</a>
            </header>
            <div class="article-scroll">
                <article class="article-card">
                    {{ARTICLE_HTML}}
                    <nav class="article-nav">
                        {{PREV_LINK}}
                        <span class="spacer"></span>
                        {{NEXT_LINK}}
                    </nav>
                </article>
            </div>
        </main>
    </div>

    <script>
        // Sidebar toggle (mobile)
        document.getElementById('openSidebar')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('open');
        });
        document.getElementById('closeSidebar')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('open');
        });

        // Search (filters dynamically rendered links)
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            const q = e.target.value.trim().toLowerCase();
            document.querySelectorAll('.nav-link').forEach(link => {
                link.style.display = (!q || link.textContent.toLowerCase().includes(q)) ? '' : 'none';
            });
        });

        // Dynamic sidebar from index.json
        (async function() {
            const navList = document.getElementById('navList');
            try {
                const res = await fetch('/index.json');
                const reports = await res.json();
                const now = new Date();
                const sevenDaysAgo = new Date(now - 7 * 86400000).toISOString().slice(0, 10);
                const currentPath = location.pathname;

                const recent = [], weekly = [], older = {};
                for (const r of reports) {
                    if (r.filename.includes('Weekly')) {
                        weekly.push(r);
                    } else if (r.date >= sevenDaysAgo) {
                        recent.push(r);
                    } else {
                        const month = r.date.slice(0, 7);
                        (older[month] = older[month] || []).push(r);
                    }
                }

                function section(icon, title, items, isOpen) {
                    const cls = isOpen ? ' open' : '';
                    let h = `<li class="nav-section${cls}"><button class="nav-section-header"><span class="icon">${icon}</span> ${title} <span class="nav-count">${items.length}</span> <span class="nav-arrow">▼</span></button><ul class="nav-items">`;
                    for (const item of items) {
                        const label = item.filename.includes('Weekly') ? `⭐ ${item.date}` : item.date;
                        const href = `/reports/${item.filename.replace('.md', '.html')}`;
                        const active = currentPath === href ? ' active' : '';
                        h += `<li><a class="nav-link${active}" href="${href}">${label}</a></li>`;
                    }
                    return h + '</ul></li>';
                }

                let html = '';
                if (recent.length) html += section('🕐', '最近日報', recent, true);
                if (weekly.length) html += section('⭐', '每週精華', weekly, false);
                for (const mk of Object.keys(older).sort().reverse()) {
                    const [y, m] = mk.split('-');
                    html += section('📂', `${y} 年 ${parseInt(m)} 月`, older[mk], false);
                }
                navList.innerHTML = html;

                navList.querySelectorAll('.nav-section-header').forEach(btn => {
                    btn.addEventListener('click', () => btn.closest('.nav-section').classList.toggle('open'));
                });

                const active = navList.querySelector('.nav-link.active');
                if (active) active.scrollIntoView({ block: 'center', behavior: 'smooth' });
            } catch (e) {
                console.warn('Sidebar load failed:', e);
            }
        })();
    </script>
</body>
</html>
