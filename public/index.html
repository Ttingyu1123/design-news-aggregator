<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計脈動日報 — tingyudeco.com</title>
    <meta name="description" content="每日自動彙整設計工具、UI/UX、網頁設計與 AI 創意科技最新動態。">
    <meta property="og:title" content="設計脈動日報">
    <meta property="og:description" content="每日自動彙整設計趨勢與工具動態">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#E0E5EC">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="alternate" type="application/rss+xml" title="設計脈動日報 RSS" href="/feed.xml">
    <style>
        body {
            margin: 0;
            background: #F8F7EE;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            color: #4A5568;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #E3F3F1;
            border-top-color: #9B7EC8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>載入最新日報...</p>
    </div>
    <script>
        (async () => {
            try {
                const res = await fetch('/index.json?t=' + Date.now());
                if (!res.ok) throw new Error('index.json not found');
                const reports = await res.json();
                reports.sort((a, b) => b.date.localeCompare(a.date));
                const latest = reports.find(r => r.filename.includes('Daily_Report')) || reports[0];
                if (latest) {
                    const htmlName = latest.filename.replace('.md', '.html');
                    window.location.replace('/reports/' + htmlName);
                }
            } catch (e) {
                document.querySelector('.loading p').textContent = '無法載入索引，請稍後再試。';
            }
        })();
    </script>
</body>
</html>
